<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora, Fecha y Ubicación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Información Actual</h1>
        <div class="info-box">
            <p><strong>Hora keloke:</strong> <span id="time">--:--:--</span></p>
            <p><strong>Fecha:</strong> <span id="date">--/--/----</span></p>
            <p><strong>Ubicación:</strong> <span id="location">Detectando...</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
